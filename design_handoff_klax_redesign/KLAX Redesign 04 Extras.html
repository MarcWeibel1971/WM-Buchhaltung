<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" src="components/pages-extras.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "klee",
  "font": "geist"
}/*EDITMODE-END*/;

function applyTweaks(t) {
  document.documentElement.setAttribute('data-theme', t.theme);
  document.documentElement.setAttribute('data-font', t.font);
  document.querySelectorAll('#tweak-panel [data-group]').forEach(g => {
    const key = g.getAttribute('data-group');
    g.querySelectorAll('button').forEach(b => {
      b.classList.toggle('on', b.getAttribute('data-v') === t[key]);
    });
  });
}
const CURRENT = { ...TWEAKS };
applyTweaks(CURRENT);

window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.type === '__activate_edit_mode') document.getElementById('tweak-panel').classList.add('on');
  if (d.type === '__deactivate_edit_mode') document.getElementById('tweak-panel').classList.remove('on');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

document.querySelectorAll('#tweak-panel [data-group]').forEach(g => {
  const key = g.getAttribute('data-group');
  g.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      CURRENT[key] = b.getAttribute('data-v');
      applyTweaks(CURRENT);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: CURRENT[key] } }, '*');
    });
  });
});

const { DesignCanvas, DCSection, DCArtboard } = window;

const App = () => (
  <DesignCanvas>
    <DCSection id="qrbill" title="QR-Rechnung" subtitle="Swiss QR Code Standard · Zahlschein-Editor">
      <DCArtboard id="qrbill" label="QR-Rechnung erstellen · R-2026-0142" width={1440} height={1100}>
        <PageQrBill />
      </DCArtboard>
    </DCSection>

    <DCSection id="cc" title="Kreditkarten-Abrechnung" subtitle="ZKB Visa Business · KI-Kontierung">
      <DCArtboard id="creditcard" label="Kreditkarte · April 2026" width={1440} height={1150}>
        <PageCreditCard />
      </DCArtboard>
    </DCSection>

    <DCSection id="time" title="Zeiterfassung" subtitle="Stunden · Projekte · Fakturierung">
      <DCArtboard id="time" label="Zeiterfassung · KW 17" width={1440} height={1100}>
        <PageTimeTracking />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
