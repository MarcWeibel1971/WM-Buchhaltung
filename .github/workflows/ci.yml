name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Einmal pro Ref / PR laufen; alte Runs abbrechen wenn neue Commits kommen.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─── Typecheck + Unit-Tests ──────────────────────────────────────────────
  test:
    name: Typecheck & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm check

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Production build
        env:
          # Drizzle config liest DATABASE_URL beim Import – Dummy reicht, weil
          # wir nur `vite build` und `esbuild` ausführen, nicht drizzle-kit.
          DATABASE_URL: "mysql://dummy:dummy@localhost:3306/dummy"
          NODE_ENV: production
        run: pnpm build

      - name: Upload build artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─── Docker Image bauen (nur auf main) ────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          tags: wm-buchhaltung:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Audit (optional, non-blocking) ─────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm audit
        run: pnpm audit --audit-level=high || true
